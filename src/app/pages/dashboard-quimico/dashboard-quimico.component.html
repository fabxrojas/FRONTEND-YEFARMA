<div class="main-layout">
    <header class="top-navbar">
        <div class="logo-container">
            <div class="logo-botica"></div>
            <span class="brand-name">BOTICA YEFARMA</span>
        </div>
        <div class="profile-area">
            <button #btn type="button" pButton icon="pi pi-user" 
                    class="p-button-rounded p-button-text p-button-plain"
                    (click)="menu.toggle($event)">
                <span class="username-label">{{ userName }}</span>
                <i class="pi pi-chevron-down"></i>
            </button>
            <p-menu #menu [model]="userOptions" [popup]="true"></p-menu>
        </div>
    </header>

    <div class="content-wrapper">
        <aside class="sidebar">
            <p-panelMenu [model]="items" [style]="{'width':'100%'}"></p-panelMenu>
        </aside>

        <main class="main-content">
            <div class="dashboard-container" *ngIf="router.url === '/dashboard-quimico'">
                <header class="dashboard-header">
                    <h1>Bienvenido, Químico Farmacéutico</h1>
                    <p>Resumen de estado para: <strong>{{ userName }}</strong></p>
                </header>

                <div class="grid-cards">
                    <div class="card kpi-card stock-low">
                        <div class="kpi-icon"><i class="pi pi-exclamation-triangle"></i></div>
                        <div class="kpi-data">
                            <span class="kpi-title">Stock Bajo</span>
                            <h2 class="kpi-value">12</h2>
                        </div>
                    </div>
                    </div>
            </div>

            <router-outlet></router-outlet>
        </main>
    </div>
</div>
