<div class="main-layout">
    <header class="top-navbar">
        <div class="logo-container">
            <div class="logo-botica"></div>
            <span class="brand-name">BOTICA YEFARMA</span>
        </div>
        <div class="profile-area">
            <button #btn type="button" pButton icon="pi pi-user" class="p-button-rounded p-button-text p-button-plain"
                (click)="menu.toggle($event)">
                <span class="username-label">{{ userName }}</span>
                <i class="pi pi-chevron-down"></i>
            </button>
            <p-menu #menu [model]="userOptions" [popup]="true"></p-menu>
        </div>
    </header>

    <div class="content-wrapper">
        <aside class="sidebar">
            <p-panelMenu [model]="items" [style]="{'width':'100%'}"></p-panelMenu>
        </aside>

        <main class="main-content">

            <div class="dashboard-container"
                *ngIf="router.url === '/dashboard-quimico'">
                <header class="dashboard-header">
                    <h1 *ngIf="router.url === '/dashboard-quimico'">Bienvenido, Químico Farmacéutico</h1>
                    <p>Resumen operativo para: <strong>{{ userName }}</strong></p>
                </header>

                <div class="grid grid-nogutter gap-3">
                    <div class="col-12 md:col-6 lg:col-3">
                        <p-card styleClass="kpi-card stock-low">
                            <div class="flex align-items-center">
                                <i class="pi pi-exclamation-triangle text-orange-500 text-3xl mr-3"></i>
                                <div>
                                    <span class="text-500">Stock Bajo</span>
                                    <div class="text-2xl font-bold">{{ dashboardData?.productosConStockBajo || 0 }}
                                    </div>
                                </div>
                            </div>
                        </p-card>
                    </div>

                    <div class="col-12 md:col-6 lg:col-3">
                        <p-card styleClass="kpi-card expiring">
                            <div class="flex align-items-center">
                                <i class="pi pi-calendar-times text-red-500 text-3xl mr-3"></i>
                                <div>
                                    <span class="text-500">Por Vencer</span>
                                    <div class="text-2xl font-bold">{{ dashboardData?.productosPorVencer?.length || 0 }}
                                    </div>
                                </div>
                            </div>
                        </p-card>
                    </div>
                </div>

                <div class="grid mt-4">
                    <div class="col-12">
                        <p-card header="Productos con Alerta de Vencimiento">
                            <ul class="list-none p-0 m-0">
                                <li *ngFor="let item of dashboardData?.productosPorVencer"
                                    class="flex align-items-center py-3 border-bottom-1 surface-border">
                                    <i class="pi pi-bell text-red-400 mr-3"></i>
                                    <span class="font-bold mr-2">{{ item.producto }}</span>
                                    <span class="text-500 ml-auto">{{ item.tipoAlerta }}</span>
                                </li>
                            </ul>
                        </p-card>
                    </div>
                </div>
            </div>

            <router-outlet></router-outlet>
        </main>
    </div>
</div>
