<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>

<div class="p-3">
    <div class="flex justify-content-center align-items-center px-2">
        <div class="flex justify-content-center align-items-center mb-3 px-2">
            <div>
                <h2 class="font-bold text-cyan-800 text-3xl m-0 flex align-items-center gap-2">
                    Registro de proveedor(es)
                </h2>
            </div>
        </div>
    </div>
    <p-card styleClass="shadow-4 border-round-xl mb-4 overflow-hidden">
        <div class="grid p-fluid mt-2">
            <div class="col-12 md:col-8 field">
                <label class="block font-bold text-sm mb-2 text-cyan-800">
                    <i class="pi pi-building"></i> Nombre / Razón Social:
                </label>
                <div class="p-inputgroup w-full">
                    <span class="p-inputgroup-addon border-round-left-lg"></span>
                    <input pInputText [(ngModel)]="nuevoProveedor.nombre" placeholder="Ej: Laboratorios Farma S.A.C."
                        class="p-inputtext-lg w-full border-round-right-lg py-2">
                </div>
            </div>

            <div class="col-12 md:col-4 field">
                <label class="block font-bold text-sm mb-2 text-cyan-800"><i class="pi pi-id-card"></i> RUC:</label>
                <div class="p-inputgroup w-full">
                    <span class="p-inputgroup-addon border-round-left-lg"></span>
                    <input pInputText [(ngModel)]="nuevoProveedor.ruc" #ruc="ngModel" maxlength="11"
                        (keypress)="soloNumeros($event)" placeholder="20123456789"
                        class="p-inputtext-lg w-full border-round-right-lg py-2">
                </div>
            </div>

            <div class="col-12 md:col-4 field">
                <label class="block font-bold text-sm mb-2 text-cyan-800"><i class="pi pi-envelope"></i> Correo
                    Electrónico:</label>
                <div class="p-inputgroup w-full">
                    <span class="p-inputgroup-addon border-round-left-lg"></span>
                    <input pInputText [(ngModel)]="nuevoProveedor.correo" placeholder="ejemplo@contacto.com"
                        class="p-inputtext-lg w-full border-round-right-lg py-2">
                </div>
            </div>

            <div class="col-12 md:col-3 field">
                <label class="block font-bold text-sm mb-2 text-cyan-800"><i class="pi pi-phone"></i> Teléfono:</label>
                <div class="p-inputgroup w-full">
                    <span class="p-inputgroup-addon border-round-left-lg"></span>
                    <input pInputText [(ngModel)]="nuevoProveedor.telefono" maxlength="9"
                        (keypress)="soloNumeros($event)" placeholder="900654000"
                        class="p-inputtext-lg w-full border-round-right-lg py-2">
                </div>
            </div>

            <div class="col-12 md:col-5 field">
                <label class="block font-bold text-sm mb-2 text-cyan-800"><i class="pi pi-map-marker"></i>
                    Dirección:</label>
                <div class="p-inputgroup w-full">
                    <span class="p-inputgroup-addon border-round-left-lg"></span>
                    <input pInputText [(ngModel)]="nuevoProveedor.direccion" placeholder="Av. Siempre Viva 742, Lima"
                        class="p-inputtext-lg w-full border-round-right-lg py-2">
                </div>

            </div>
        </div>

        <div class="flex justify-content-end gap-2 mt-3">
            <p-button label="Limpiar / Nuevo" icon="pi pi-refresh" (onClick)="finalizarAccion()"
                styleClass="p-button-secondary border-round-lg px-4 shadow-2"></p-button>

            <p-button *ngIf="proveedorSeleccionado" label="Eliminar Proveedor" icon="pi pi-trash"
                (onClick)="eliminarProveedor()" styleClass="p-button-danger border-round-lg px-4 shadow-2"></p-button>

            <p-button [label]="proveedorSeleccionado ? 'Guardar Cambios' : 'Registrar'"
                [icon]="proveedorSeleccionado ? 'pi pi-pencil' : 'pi pi-save'" (onClick)="registrar()"
                styleClass="p-button-info border-round-lg px-4 shadow-2"></p-button>
        </div>
    </p-card>

    <p-card styleClass="shadow-4 border-round-xl overflow-hidden mt-4">
        <div class="p-3">

            <div class="mb-3 px-2">
                <span class="text-xl font-bold text-cyan-900">Proveedores Registrados</span>
            </div>

            <p-table #dt [value]="proveedores" selectionMode="single" [(selection)]="proveedorSeleccionado"
                (onRowSelect)="onRowSelect($event)" dataKey="idProveedor" [rows]="5" [paginator]="true"
                [globalFilterFields]="['nombre', 'ruc']" styleClass="p-datatable-sm shadow-2">

                <ng-template pTemplate="caption">
                    <div class="flex justify-content-end p-2">
                        <span class="p-input-icon-right">
                            <i class="pi pi-search"></i>
                            <input pInputText type="text"
                                (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                                placeholder="Buscar por nombre o RUC"
                                class="p-inputtext-sm border-round-lg py-2 md:w-20rem w-full">
                        </span>
                    </div>
                </ng-template>

                <ng-template pTemplate="header">
                    <tr class="bg-gray-50">
                        <th style="width: 30%; text-align: center;">Nombre</th>
                        <th style="width: 15%; text-align: center;">RUC</th>
                        <th style="width: 20%; text-align: center;">Correo</th>
                        <th style="width: 15%; text-align: center;">Teléfono</th>
                        <th style="width: 25%; text-align: center;">Fecha Registro</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-prov>
                    <tr [pSelectableRow]="prov" class="cursor-pointer transition-colors transition-duration-200">
                        <td class="font-semibold text-center">{{prov.nombre}}</td>
                        <td class="text-center">{{prov.ruc}}</td>
                        <td class="text-center">{{prov.correo}}</td>
                        <td class="text-center">{{prov.telefono}}</td>
                        <td class="text-center">{{prov.fechaCreacion | date:'dd/MM/yyyy HH:mm'}}</td>
                    </tr>
                </ng-template>
            </p-table>

        </div>
    </p-card>
</div>
